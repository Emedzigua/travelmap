<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="utf-8">
    <title>Travel Map</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #111; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Štýl pre svietiace body */
        .marker {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0px rgba(255, 255, 255, 0.7); }
            100% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
        }

        /* Bublina s informáciami */
        .mapboxgl-popup-content {
            background: #1e1e1e !important;
            color: white !important;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #444;
        }
        .mapboxgl-popup-close-button { color: white; padding: 5px; }
        
        .popup-link {
            display: inline-block;
            margin-top: 10px;
            color: #111;
            background-color: #00ffcc;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
        }

        /* Plávajúce tlačidlo PRIDAŤ */
        .add-button {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 65px;
            height: 65px;
            background-color: #00ffcc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: #111;
            text-decoration: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
            z-index: 9999;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .add-button:active { transform: scale(0.9); }

        /* Úprava ovládacích prvkov mapy */
        .mapboxgl-ctrl-group {
            background: rgba(30, 30, 30, 0.8) !important;
            border: 1px solid #444 !important;
        }
        .mapboxgl-ctrl button span { filter: invert(1); }
    </style>
</head>
<body>

<div id="map"></div>

<a href="https://docs.google.com/spreadsheets/d/1HC5V_ZK9LTL12lzxRqp0nNYL5u_PkVT8FazjXmKl8k4/edit?gid=0#gid=0" target="_blank" class="add-button">+</a>

<script>
    // TVOJE ÚDAJE
    const mapboxToken = 'pk.eyJ1IjoibWFreXl5IiwiYSI6ImNtbzVpc3FtdDB3ZjcycHNneTR5d2R3a2oifQ.Su6Onl3Dn-YL8XIPXRfB6g';
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSKxSWXvTdARJ382V_ddbLoem05pzFFn_oyDsbcSypciDETuXIHTlA9_xCmAYaZ_AklPPzGFVkpu9Ek/pub?output=csv';

    mapboxgl.accessToken = mapboxToken;

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [19.6, 48.6],
        zoom: 3,
        pitch: 45 // Mierny náklon mapy pre 3D efekt
    });

    // PRIDANIE KOMPASU A OVLÁDANIA (Zoom, Rotácia)
    map.addControl(new mapboxgl.NavigationControl({
        visualizePitch: true,
        showZoom: true,
        showCompass: true
    }), 'top-right');

    // Spracovanie dát z Google Sheets
    map.on('load', () => {
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                results.data.forEach((row, index) => {
                    const lat = parseFloat(row.Lat);
                    const lng = parseFloat(row.Lng);
                    const farba = row.Farba || '#00ffcc';

                    if (isNaN(lat) || isNaN(lng)) return;

                    // 1. Bod (Marker)
                    const el = document.createElement('div');
                    el.className = 'marker';
                    el.style.backgroundColor = farba;
                    el.style.boxShadow = `0 0 12px ${farba}`;

                    new mapboxgl.Marker(el)
                        .setLngLat([lng, lat])
                        .setPopup(new mapboxgl.Popup({ offset: 25 })
                        .setHTML(`
                            <h3 style="margin:0 0 10px 0; border-bottom: 1px solid #444; padding-bottom: 5px;">${row.Mesto}</h3>
                            ${row.Album ? `<a href="${row.Album}" target="_blank" class="popup-link">Otvoriť album 📸</a>` : '<p style="color:#888">Žiadne fotky</p>'}
                        `))
                        .addTo(map);

                    // 2. Trasa (Čiara)
                    if (row.Trasa && row.Trasa.trim() !== "") {
                        try {
                            const points = row.Trasa.split(';').map(p => {
                                const pair = p.trim().split(',');
                                return [parseFloat(pair[0]), parseFloat(pair[1])];
                            });

                            const routeId = 'route' + index;
                            map.addSource(routeId, {
                                'type': 'geojson',
                                'data': {
                                    'type': 'Feature',
                                    'geometry': { 'type': 'LineString', 'coordinates': points }
                                }
                            });
                            map.addLayer({
                                'id': routeId,
                                'type': 'line',
                                'source': routeId,
                                'paint': {
                                    'line-color': farba,
                                    'line-width': 2.5,
                                    'line-dasharray': [2, 1]
                                }
                            });
                        } catch (e) { console.error("Chyba trasy:", e); }
                    }
                });
            }
        });
    });

    // Pomôcka pre súradnice na kliknutie
    map.on('click', (e) => {
        const coords = `${e.lngLat.lng.toFixed(4)}, ${e.lngLat.lat.toFixed(4)}`;
        new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`Súradnice pre Tabuľku:<br><strong style="color:#00ffcc">${coords}</strong>`)
            .addTo(map);
    });
</script>

</body>
</html>
